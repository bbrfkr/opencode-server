services:
  # ホストの opencode serve をコンテナ化したもの。
  opencode:
    build: ./opencode
    env_file:
      # LITELLM_BASE_URL / LITELLM_API_KEY を注入（opencode.json から {env:...} で参照）。
      - .env
    environment:
      OPENCODE_CONFIG: /config/opencode.json
      XDG_DATA_HOME: /data
      # GH_TOKEN は env_file(.env) から渡され、gh が自動で読み取る（ブラウザ認証不要）。
      # コミット著者情報は git ネイティブの env で注入する。.env の 1 組を 4 変数に展開。
      GIT_AUTHOR_NAME: ${GIT_USER_NAME:?GIT_USER_NAME is required (set it in .env)}
      GIT_AUTHOR_EMAIL: ${GIT_USER_EMAIL:?GIT_USER_EMAIL is required (set it in .env)}
      GIT_COMMITTER_NAME: ${GIT_USER_NAME}
      GIT_COMMITTER_EMAIL: ${GIT_USER_EMAIL}
    # opencode serve はカレントディレクトリをプロジェクトルートとして扱う。
    # PKM vault を指すことで、AI が vault 内のノートを参照・編集できるようにする。
    working_dir: /root/project
    volumes:
      # プロバイダ設定（API キーは含まず env 置換）。
      - ./opencode/opencode.json:/config/opencode.json:ro
      # セッション DB を永続化（再起動後もセッションを保持）。
      - opencode-data:/data
      # PKM vault（Obsidian）を読み書き可能でマウント。これが opencode のプロジェクトルート。
      # ホスト側パスは .env の PKM_VAULT_PATH で指定（必須）。
      - ${PKM_VAULT_PATH:?PKM_VAULT_PATH is required (set it in .env)}:/root/project
    ports:
      - "4096:4096"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4096/global/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
volumes:
  opencode-data:
