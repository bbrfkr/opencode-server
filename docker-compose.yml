services:
  # opencode サーバー本体。PKM vault でも n8n ワークフロー仕様でも、project root に
  # マウントするものを PROJECT_PATH で切り替えて使い回す（単一イメージ・単一の真実点）。
  # discord bot 等のクライアントは OPENCODE_BASE_URL でこのサーバーへ HTTP 接続する。
  opencode:
    build: ./opencode
    env_file:
      # LITELLM_BASE_URL / LITELLM_API_KEY を注入（opencode.json から {env:...} で参照）。
      - .env
    environment:
      OPENCODE_CONFIG: /config/opencode.json
      XDG_DATA_HOME: /data
      # git の HTTPS 認証も gh の API 認証も n8n ブローカー経由の短命トークンで行う（静的 GitHub トークンは持たせない）。
      # プラグイン(github-token.js)が発行/失効し、credential helper / gh ラッパーが受け渡す。その n8n の親 URL。
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:?N8N_WEBHOOK_BASE_URL is required (set it in .env)}
      # コミット著者情報は git ネイティブの env で注入する。.env の 1 組を 4 変数に展開。
      GIT_AUTHOR_NAME: ${GIT_USER_NAME:?GIT_USER_NAME is required (set it in .env)}
      GIT_AUTHOR_EMAIL: ${GIT_USER_EMAIL:?GIT_USER_EMAIL is required (set it in .env)}
      GIT_COMMITTER_NAME: ${GIT_USER_NAME}
      GIT_COMMITTER_EMAIL: ${GIT_USER_EMAIL}
    # opencode serve はカレントディレクトリをプロジェクトルートとして扱う。
    working_dir: /root/project
    volumes:
      # プロバイダ設定（API キーは含まず env 置換）。
      - ./opencode/opencode.json:/config/opencode.json:ro
      # セッション DB を永続化（再起動後もセッションを保持）。
      - opencode-data:/data
      # project root にマウントする対象（用途で切替）。ホスト側パスは .env の PROJECT_PATH で指定（必須）。
      #   - PKM 用途: Obsidian vault のパス
      #   - bot 用途: n8n ワークフロー仕様リポ等のパス
      #   - コーディング用途: 空のワークスペースディレクトリ（AI がこの配下に repo 群を clone して作業する）
      - ${PROJECT_PATH:?PROJECT_PATH is required (set it in .env)}:/root/project
      # mise（言語ツールチェーンマネージャ）のインストール済みツール・DL キャッシュを永続化する。
      # コンテナ再生成後も再 DL/再ビルド不要（＝バイナリキャッシュ）。PKM/bot 用途では未使用だが
      # マウントしても実害はなく、コーディング用途でそのまま効く。
      - mise:/mise
    ports:
      # クライアント（discord bot 等）が OPENCODE_BASE_URL で到達できるよう公開する。
      # 同一ホストで複数サービスを起動する場合に備え、ホスト側ポートは OPENCODE_PORT で可変にする
      # （未指定なら 4096）。コンテナ内は 4096 固定。
      - "${OPENCODE_PORT:-4096}:4096"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4096/global/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
volumes:
  opencode-data:
  # mise のツールチェーン・キャッシュ専用 volume（コーディング用途のバイナリキャッシュ）。
  mise:
